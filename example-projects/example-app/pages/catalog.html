<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Catalog</title>
  <link rel="stylesheet" href="../styles/base.css" />
</head>
<body>
  <header class="topbar"><h1>Example App Store</h1><nav id="app-nav" class="nav"></nav></header>
  <main class="page">
    <section class="card">
      <div class="toolbar">
        <input id="search-input" placeholder="Search products..." />
        <select id="category-select"></select>
        <select id="sort-select">
          <option value="name">Sort: Name</option>
          <option value="price-asc">Sort: Price Low</option>
          <option value="price-desc">Sort: Price High</option>
          <option value="stock">Sort: Stock</option>
        </select>
      </div>
      <div id="products-grid" class="grid products"></div>
    </section>
  </main>
  <script type="module" src="../scripts/catalog.js"></script>
</body>
</html>
