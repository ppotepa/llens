<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reports</title>
  <link rel="stylesheet" href="../styles/base.css" />
</head><body>
  <header class="topbar"><h1>Example App Store</h1><nav id="app-nav" class="nav"></nav></header>
  <main class="page grid" style="gap:10px">
    <section class="report-grid">
      <article class="card"><div class="muted">Products</div><div id="product-count" class="stat">0</div></article>
      <article class="card"><div class="muted">Categories</div><div id="category-count" class="stat">0</div></article>
      <article class="card"><div class="muted">Inventory Value</div><div id="inventory-value" class="stat">$0.00</div></article>
    </section>
    <section class="card"><h2>Low Stock</h2><ul id="low-stock" class="list"></ul></section>
    <section class="card"><h2>Top Cart Items</h2><ul id="top-cart" class="list"></ul></section>
  </main>
  <script type="module" src="../scripts/reports.js"></script>
</body></html>
