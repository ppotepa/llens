<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cart</title>
  <link rel="stylesheet" href="../styles/base.css" />
</head><body>
  <header class="topbar"><h1>Example App Store</h1><nav id="app-nav" class="nav"></nav></header>

    </section>
  </main>
  <script type="module" src="../scripts/cart.js"></script>
