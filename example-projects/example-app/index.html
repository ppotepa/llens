<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Example App Store</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Example App Store</h1>
    <p>Products, categories, cart, and lightweight admin actions.</p>
  </header>

  <main class="layout">
    <aside class="panel stack">
      <section>
        <h2>Categories</h2>
        <ul id="category-list" class="list"></ul>
      </section>

      <section>
        <h3>Add Category</h3>
        <form id="category-form" class="form-grid">
          <input id="category-name" type="text" placeholder="Category name" required />
          <button type="submit">Create</button>
        </form>
      </section>
    </aside>

    <section class="panel grow stack">
      <div class="toolbar">
        <input id="search-input" type="search" placeholder="Search products..." />
        <select id="sort-select">
          <option value="name">Sort: Name</option>
          <option value="price-asc">Sort: Price (Low)</option>
          <option value="price-desc">Sort: Price (High)</option>
          <option value="stock">Sort: Stock</option>
        </select>
      </div>

      <div id="products-grid" class="grid"></div>

      <section>
        <h3>Add Product</h3>
        <form id="product-form" class="form-grid two-col">
          <input id="product-name" type="text" placeholder="Name" required />
          <select id="product-category" required></select>
          <input id="product-price" type="number" min="0" step="0.01" placeholder="Price" required />
          <input id="product-stock" type="number" min="0" step="1" placeholder="Stock" required />
          <button type="submit">Add Product</button>
        </form>
      </section>
    </section>

    <aside class="panel stack">
      <section>
        <h2>Cart</h2>
        <ul id="cart-list" class="list"></ul>
        <p id="cart-total" class="total">Total: $0.00</p>
      </section>

      <section class="row gap">
        <button id="clear-cart" class="soft">Clear Cart</button>
        <button id="seed-demo" class="soft">Reset Demo Data</button>
      </section>
    </aside>
  </main>

  <script src="./app.js"></script>
</body>
</html>
