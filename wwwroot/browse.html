<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llens — code browser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --yellow:   #d29922;
    --red:      #f85149;
    --purple:   #bc8cff;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --code-bg:  #0d1117;
    --radius:   6px;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    height: 100vh;
    display: grid;
    grid-template-rows: 48px 1fr;
    grid-template-columns: 280px 1fr 380px;
    grid-template-areas:
      "header header header"
      "sidebar main detail";
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    grid-area: header;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
  }
  header h1 { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: -0.3px; }
  header h1 span { color: var(--muted); font-weight: 400; }

  #project-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
  }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--border);
    color: var(--muted);
  }
  .badge.cs   { background: #1c3a5e; color: #58a6ff; }
  .badge.rust { background: #3d2000; color: #f0883e; }

  #status { margin-left: auto; font-size: 12px; color: var(--muted); }
  #status.ok  { color: var(--green); }
  #status.err { color: var(--red); }

  /* ── Sidebar ── */
  aside {
    grid-area: sidebar;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .search-box {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  input[type=text], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: var(--radius);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }

  .file-list, .symbol-list {
    overflow-y: auto;
    flex: 1;
  }

  .list-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 7px 14px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: background 0.1s;
  }
  .list-item:hover { background: var(--surface); }
  .list-item.active { background: #1c2d44; border-left: 2px solid var(--accent); padding-left: 12px; }

  .list-item .icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .list-item .info { min-width: 0; }
  .list-item .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-item .meta { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .kind-tag {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .kind-0  { background: #1a3a5c; color: #79c0ff; }  /* Class */
  .kind-1  { background: #2d1b69; color: #d2a8ff; }  /* Interface */
  .kind-2  { background: #1a3a20; color: #56d364; }  /* Method */
  .kind-3  { background: #3a2a00; color: #e3b341; }  /* Property */
  .kind-4  { background: #3a1a00; color: #ffa657; }  /* Field */
  .kind-5  { background: #3a0000; color: #ff7b72; }  /* Enum */
  .kind-6  { background: #1e2228; color: #8b949e; }  /* Unknown */

  /* ── Main ── */
  main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab {
    padding: 10px 18px;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: color 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; flex-direction: column; }

  /* ── Symbol results ── */
  #symbol-results {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  .result-item {
    padding: 8px 16px;
    cursor: pointer;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    border-bottom: 1px solid transparent;
    transition: background 0.1s;
  }
  .result-item:hover { background: var(--surface); }
  .result-item.active { background: #1c2d44; }
  .result-item .sym-name { font-size: 13px; font-weight: 500; font-family: var(--font-mono); }
  .result-item .sym-path { font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  .result-item .sym-sig  { font-size: 11px; color: var(--muted); font-family: var(--font-mono); grid-column: 2; padding-left: 0; }

  .empty { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 13px; }

  /* ── File browser ── */
  #file-results { overflow-y: auto; flex: 1; }

  .file-item {
    padding: 7px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
    border-bottom: 1px solid transparent;
  }
  .file-item:hover { background: var(--surface); }
  .file-item.active { background: #1c2d44; }
  .file-item .f-name { font-size: 13px; font-family: var(--font-mono); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-item .f-count { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* ── Detail pane ── */
  #detail {
    grid-area: detail;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #detail-title {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #detail-body { flex: 1; overflow-y: auto; }

  .detail-section { border-bottom: 1px solid var(--border); padding: 12px 14px; }
  .detail-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; }

  .detail-row { display: flex; gap: 8px; margin-bottom: 4px; align-items: flex-start; }
  .detail-label { font-size: 11px; color: var(--muted); min-width: 70px; flex-shrink: 0; }
  .detail-value { font-size: 12px; font-family: var(--font-mono); word-break: break-all; }

  #context-code {
    margin: 0;
    padding: 12px 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.6;
    background: var(--code-bg);
    color: var(--text);
    white-space: pre;
    overflow-x: auto;
    flex: 1;
  }

  .ref-item {
    padding: 6px 14px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    cursor: pointer;
  }
  .ref-item:hover { background: var(--surface); }
  .ref-item .ref-file { color: var(--accent); font-size: 11px; }
  .ref-item .ref-ctx  { color: var(--muted); }

  .import-tag {
    display: inline-block;
    font-size: 11px;
    font-family: var(--font-mono);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    margin: 2px;
    color: var(--muted);
  }

  .btn {
    font-size: 11px;
    padding: 3px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .loader { display: none; }
  .loader.active { display: block; color: var(--muted); font-size: 12px; padding: 8px 14px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>llens <span>/ browse</span></h1>
  <select id="project-select"><option value="">loading...</option></select>
  <span id="project-langs"></span>
  <span id="status">connecting...</span>
</header>

<aside>
  <div class="panel-header">
    <span>Files</span>
    <button class="btn" id="btn-refresh-files">↺</button>
  </div>
  <div class="file-list" id="file-list">
    <div class="empty">Select a project</div>
  </div>
</aside>

<main>
  <div class="tabs">
    <div class="tab active" data-tab="symbols">Symbols</div>
    <div class="tab" data-tab="files">File Detail</div>
    <div class="tab" data-tab="refs">References</div>
  </div>

  <!-- Symbols tab -->
  <div class="tab-content active" id="tab-symbols">
    <div class="search-box">
      <input type="text" id="sym-search" placeholder="Search symbols…" autocomplete="off">
      <select id="sym-kind">
        <option value="">All kinds</option>
        <option value="Class">Class</option>
        <option value="Interface">Interface</option>
        <option value="Method">Method</option>
        <option value="Property">Property</option>
        <option value="Field">Field</option>
        <option value="Enum">Enum</option>
      </select>
    </div>
    <div id="symbol-results"><div class="empty">Type to search symbols</div></div>
  </div>

  <!-- File detail tab -->
  <div class="tab-content" id="tab-files">
    <div id="file-results"><div class="empty">Select a file from the sidebar</div></div>
  </div>

  <!-- References tab -->
  <div class="tab-content" id="tab-refs">
    <div id="ref-results"><div class="empty">Click a symbol to see references</div></div>
  </div>
</main>

<div id="detail">
  <div id="detail-title">
    <span id="detail-label">Nothing selected</span>
    <button class="btn" id="btn-refs" style="display:none">Find refs</button>
  </div>
  <div id="detail-body">
    <div class="empty" style="padding-top:60px">Select a symbol or file</div>
  </div>
</div>

<script>
const API = '';
let currentProject = '';
let currentSymbol  = null;
let searchTimer    = null;

// ── Utilities ──────────────────────────────────────────────────────────────

async function get(url) {
  const r = await fetch(API + url);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

function kindName(k)  { return ['Class','Interface','Method','Property','Field','Enum','Unknown'][k] ?? 'Unknown'; }
function kindClass(k) { return `kind-${k}`; }

function shortPath(p) {
  const parts = p.split('/');
  return parts.slice(-2).join('/');
}

function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
}

// ── Projects ───────────────────────────────────────────────────────────────

async function loadProjects() {
  try {
    const projects = await get('/api/projects');
    const sel = document.getElementById('project-select');
    sel.innerHTML = projects.map(p =>
      `<option value="${p.name}">${p.name}</option>`
    ).join('');
    if (projects.length) selectProject(projects[0].name, projects[0].languages);
    setStatus('● connected', 'ok');
  } catch(e) {
    setStatus('✕ offline', 'err');
  }
}

function selectProject(name, langs) {
  currentProject = name;
  const langsEl = document.getElementById('project-langs');
  langsEl.innerHTML = (langs || []).map(l => {
    const cls = l.name === 'Rust' ? 'rust' : 'cs';
    return `<span class="badge ${cls}">${l.name}</span>`;
  }).join(' ');
  loadFiles();
  clearDetail();
}

document.getElementById('project-select').addEventListener('change', async e => {
  const projects = await get('/api/projects');
  const p = projects.find(x => x.name === e.target.value);
  if (p) selectProject(p.name, p.languages);
});

// ── File list ──────────────────────────────────────────────────────────────

async function loadFiles() {
  const list = document.getElementById('file-list');
  list.innerHTML = '<div class="loader active">Loading…</div>';
  try {
    const files = await get(`/api/files/?project=${encodeURIComponent(currentProject)}`);
    if (!files.length) { list.innerHTML = '<div class="empty">No files indexed</div>'; return; }

    files.sort((a,b) => a.filePath.localeCompare(b.filePath));
    list.innerHTML = files.map(f => `
      <div class="file-item" data-path="${f.filePath}" data-lang="${f.language}">
        <span>${f.language === 'Rust' ? '🦀' : '🔷'}</span>
        <span class="f-name" title="${f.filePath}">${shortPath(f.filePath)}</span>
        <span class="f-count">${f.symbolCount}</span>
      </div>
    `).join('');

    list.querySelectorAll('.file-item').forEach(el => {
      el.addEventListener('click', () => {
        list.querySelectorAll('.file-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        loadFileDetail(el.dataset.path);
        switchTab('files');
      });
    });
  } catch(e) {
    list.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

document.getElementById('btn-refresh-files').addEventListener('click', loadFiles);

// ── File detail ────────────────────────────────────────────────────────────

async function loadFileDetail(filePath) {
  const tab = document.getElementById('file-results');
  tab.innerHTML = '<div class="loader active">Loading…</div>';

  try {
    const [node, symbols] = await Promise.all([
      get(`/api/files/node?path=${encodeURIComponent(filePath)}`),
      get(`/api/symbols/in-file?path=${encodeURIComponent(filePath)}`)
    ]);

    const depHtml = node.imports?.length
      ? node.imports.map(i => `<span class="import-tag">${i}</span>`).join('')
      : '<span style="color:var(--muted);font-size:12px">none</span>';

    const symRows = symbols.map(s => `
      <div class="result-item" data-id="${s.id}" data-line="${s.lineStart}"
           data-path="${s.filePath}" data-name="${s.name}">
        <span class="kind-tag ${kindClass(s.kind)}">${kindName(s.kind)}</span>
        <span class="sym-name">${s.name}</span>
        <span style="font-size:11px;color:var(--muted)">L${s.lineStart}</span>
        ${s.signature ? `<span class="sym-sig" style="grid-column:2;color:var(--muted)">${s.signature}</span>` : ''}
      </div>
    `).join('') || '<div class="empty">No symbols</div>';

    tab.innerHTML = `
      <div class="detail-section">
        <h3>Imports</h3>
        <div>${depHtml}</div>
      </div>
      <div class="detail-section" style="border:none">
        <h3>Symbols (${symbols.length})</h3>
      </div>
      ${symRows}
    `;

    tab.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        tab.querySelectorAll('.result-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        loadSymbolDetail({ id: el.dataset.id, filePath: el.dataset.path,
          lineStart: +el.dataset.line, name: el.dataset.name });
      });
    });

    showFileHeader(filePath, node);
  } catch(e) {
    tab.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function showFileHeader(filePath, node) {
  document.getElementById('detail-label').textContent = shortPath(filePath);
  document.getElementById('btn-refs').style.display = 'none';
  renderFileDetailPane(filePath, node);
}

async function renderFileDetailPane(filePath, node) {
  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="detail-section">
      <h3>File info</h3>
      <div class="detail-row"><span class="detail-label">Language</span><span class="detail-value">${node.language}</span></div>
      <div class="detail-row"><span class="detail-label">Symbols</span><span class="detail-value">${node.symbolCount}</span></div>
      <div class="detail-row"><span class="detail-label">Indexed</span><span class="detail-value">${new Date(node.lastIndexedAt*1000).toLocaleTimeString()}</span></div>
    </div>
    <div class="detail-section">
      <h3>Dependents <button class="btn" id="btn-load-deps">load</button></h3>
      <div id="deps-list"><span style="color:var(--muted);font-size:12px">Click load</span></div>
    </div>
    <pre id="context-code">Select a symbol to see source</pre>
  `;

  document.getElementById('btn-load-deps').addEventListener('click', async () => {
    const el = document.getElementById('deps-list');
    el.textContent = 'Loading…';
    try {
      const deps = await get(`/api/files/dependents?path=${encodeURIComponent(filePath)}&project=${encodeURIComponent(currentProject)}`);
      el.innerHTML = deps.length
        ? deps.map(d => `<div class="import-tag" style="display:block;margin:3px 0">${shortPath(d.filePath)}</div>`).join('')
        : '<span style="color:var(--muted);font-size:12px">none found</span>';
    } catch(e) { el.textContent = 'Error'; }
  });
}

// ── Symbol search ──────────────────────────────────────────────────────────

async function searchSymbols(q) {
  const results = document.getElementById('symbol-results');
  if (!q && !document.getElementById('sym-kind').value) {
    results.innerHTML = '<div class="empty">Type to search symbols</div>';
    return;
  }

  results.innerHTML = '<div class="loader active">Searching…</div>';

  try {
    const kind = document.getElementById('sym-kind').value;
    const url = kind && !q
      ? `/api/symbols/search?q=&project=${encodeURIComponent(currentProject)}&kind=${kind}`
      : `/api/symbols/search?q=${encodeURIComponent(q)}&project=${encodeURIComponent(currentProject)}${kind ? `&kind=${kind}` : ''}`;

    const symbols = await get(url);

    if (!symbols.length) { results.innerHTML = '<div class="empty">No results</div>'; return; }

    results.innerHTML = symbols.map(s => `
      <div class="result-item" data-id="${s.id}" data-line="${s.lineStart}"
           data-path="${s.filePath}" data-name="${s.name}">
        <span class="kind-tag ${kindClass(s.kind)}">${kindName(s.kind)}</span>
        <div>
          <div class="sym-name">${s.name}</div>
          ${s.signature ? `<div class="sym-sig">${s.signature}</div>` : ''}
        </div>
        <span class="sym-path">${shortPath(s.filePath)}:${s.lineStart}</span>
      </div>
    `).join('');

    results.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        results.querySelectorAll('.result-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        loadSymbolDetail({ id: el.dataset.id, filePath: el.dataset.path,
          lineStart: +el.dataset.line, name: el.dataset.name });
      });
    });
  } catch(e) {
    results.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

document.getElementById('sym-search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => searchSymbols(e.target.value.trim()), 250);
});

document.getElementById('sym-kind').addEventListener('change', () => {
  searchSymbols(document.getElementById('sym-search').value.trim());
});

// ── Symbol detail ──────────────────────────────────────────────────────────

async function loadSymbolDetail(sym) {
  currentSymbol = sym;
  document.getElementById('detail-label').textContent = sym.name;
  document.getElementById('btn-refs').style.display = '';

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="detail-section">
      <h3>Symbol</h3>
      <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${sym.name}</span></div>
      <div class="detail-row"><span class="detail-label">File</span><span class="detail-value" style="color:var(--accent)">${shortPath(sym.filePath)}</span></div>
      <div class="detail-row"><span class="detail-label">Line</span><span class="detail-value">${sym.lineStart}</span></div>
    </div>
    <div class="loader active" id="ctx-loader">Loading context…</div>
    <pre id="context-code"></pre>
  `;

  try {
    const ctx = await get(`/api/files/context?path=${encodeURIComponent(sym.filePath)}&line=${sym.lineStart}&radius=12`);
    document.getElementById('ctx-loader').classList.remove('active');
    document.getElementById('context-code').textContent = ctx.context ?? '';
  } catch(e) {
    document.getElementById('ctx-loader').textContent = 'Failed to load context';
  }
}

document.getElementById('btn-refs').addEventListener('click', async () => {
  if (!currentSymbol) return;
  switchTab('refs');
  const tab = document.getElementById('ref-results');
  tab.innerHTML = '<div class="loader active">Loading references…</div>';
  try {
    const refs = await get(`/api/symbols/references?symbolId=${encodeURIComponent(currentSymbol.id)}&project=${encodeURIComponent(currentProject)}`);
    tab.innerHTML = refs.length
      ? refs.map(r => `
          <div class="ref-item">
            <div class="ref-file">${shortPath(r.inFilePath)}:${r.line}</div>
            <div class="ref-ctx">${r.context ?? ''}</div>
          </div>`).join('')
      : '<div class="empty">No references indexed yet</div>';
  } catch(e) {
    tab.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
});

// ── Misc ───────────────────────────────────────────────────────────────────

function clearDetail() {
  document.getElementById('detail-label').textContent = 'Nothing selected';
  document.getElementById('btn-refs').style.display = 'none';
  document.getElementById('detail-body').innerHTML = '<div class="empty" style="padding-top:60px">Select a symbol or file</div>';
  document.getElementById('symbol-results').innerHTML = '<div class="empty">Type to search symbols</div>';
  document.getElementById('file-results').innerHTML  = '<div class="empty">Select a file from the sidebar</div>';
  document.getElementById('ref-results').innerHTML   = '<div class="empty">Click a symbol to see references</div>';
}

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => switchTab(t.dataset.tab))
);

// ── Boot ───────────────────────────────────────────────────────────────────
loadProjects();
</script>
