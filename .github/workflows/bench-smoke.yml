name: bench-smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bench-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore bench project
        run: dotnet restore Llens.Bench/Llens.Bench.csproj

      - name: Run workflow smoke benchmark
        run: dotnet run --project Llens.Bench/Llens.Bench.csproj -- --filter Workflow --temperature both --repeats 2 --out Llens.Bench/out-ci

      - name: Run history smoke benchmark
        run: dotnet run --project Llens.Bench/Llens.Bench.csproj -- --history-only --temperature warm --repeats 1 --out Llens.Bench/out-ci-history

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-smoke-artifacts
          path: |
            Llens.Bench/out-ci/*.json
            Llens.Bench/out-ci/*.csv
            Llens.Bench/out-ci-history/*.json
            Llens.Bench/out-ci-history/*.csv
          if-no-files-found: error
